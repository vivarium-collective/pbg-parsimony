<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>parsimony — 3D molecular packing</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2016%2016'%3E%3Crect%20width='16'%20height='16'%20rx='3'%20fill='%230e1116'/%3E%3Ccircle%20cx='8'%20cy='8'%20r='5'%20fill='%23e8833a'/%3E%3C/svg%3E">
  <meta name="description" content="An interactive 3D structural model of an Escherichia coli cell.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="3D E. coli">
  <meta property="og:description" content="Explore an interactive whole-cell structural model of E. coli.">
  <meta name="color-scheme" content="dark">
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --panel-2: #1f2630;
      --text: #d6dde3;
      --text-dim: #8a96a3;
      --accent: #ffb169;
      --border: #2a313c;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }
    #app {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto 1fr auto;
      grid-template-areas: "header header" "sidebar canvas" "footer footer";
      height: 100vh;
    }
    header {
      grid-area: header;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    header h1 .sub { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 8px; }
    header .hint { color: var(--text-dim); font-size: 11.5px; }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:disabled:hover { border-color: var(--border); }
    #vr-button[data-vr-state="ready"], #vr-button[data-vr-state="active"] { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    #canvas-wrap { grid-area: canvas; position: relative; overflow: hidden; }
    canvas { display: block; outline: none; }
    #drop-overlay { display: none; }
    #app.sidebar-hidden { grid-template-columns: 0 1fr; }
    #app.sidebar-hidden #sidebar { display: none; }
    #about-panel {
      position: absolute; top: 14px; right: 14px; z-index: 30; width: 340px; max-width: calc(100% - 28px);
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px 18px 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #about-panel[hidden] { display: none; }
    #about-close {
      position: absolute; top: 8px; right: 10px; background: none; border: none;
      color: var(--text-dim); font-size: 18px; line-height: 1; padding: 2px 6px; cursor: pointer;
    }
    #about-close:hover { color: var(--text); }
    #about-body h3 { margin: 0 0 8px; font-size: 13.5px; font-weight: 600; }
    #about-body p { margin: 0 0 9px; font-size: 12px; line-height: 1.5; color: var(--text); }
    #about-body .credit { color: var(--text-dim); font-size: 11.5px; margin-top: 10px; }
    #about-body a { color: var(--accent); text-decoration: none; }
    #about-body a:hover { text-decoration: underline; }
    #about-body h4 { margin: 12px 0 4px; font-size: 12px; font-weight: 600; }
    #about-body .astat { font-size: 11.5px; color: var(--text-dim); margin: 0 0 6px; }
    #about-body .astat strong { color: var(--text); font-variant-numeric: tabular-nums; }
    #about-body .atbl { width: 100%; border-collapse: collapse; font-size: 11px; }
    #about-body .atbl th { text-align: right; color: var(--text-dim); font-weight: 500; padding: 1px 0; border-bottom: 1px solid var(--border); }
    #about-body .atbl th:first-child { text-align: left; }
    #about-body .atbl td { padding: 1px 0; font-variant-numeric: tabular-nums; text-align: right; }
    #about-body .atbl td:first-child { text-align: left; }
    #about-body .atbl .adot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    #about-body .anote { font-size: 11px; color: var(--text-dim); line-height: 1.45; margin: 10px 0 0; }
    #about-body .anote strong { color: var(--text); }
    #about-panel { max-height: calc(100vh - 28px); overflow-y: auto; }
    #info-panel {
      position: absolute; bottom: 14px; left: 14px; z-index: 30; width: 320px; max-width: calc(100% - 28px);
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #info-panel[hidden] { display: none; }
    #info-close {
      position: absolute; top: 8px; right: 10px; background: none; border: none;
      color: var(--text-dim); font-size: 18px; line-height: 1; padding: 2px 6px; cursor: pointer;
    }
    #info-close:hover { color: var(--text); }
    #info-body .info-name { font-size: 13.5px; font-weight: 600; margin: 0 18px 6px 0; line-height: 1.3; }
    #info-body .info-cat { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); margin-bottom: 8px; }
    #info-body .info-cat .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    #info-body .info-stat { font-size: 12px; margin: 3px 0; }
    #info-body .info-stat .num { font-variant-numeric: tabular-nums; color: var(--text); }
    #info-body .info-actions { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
    #info-body a.info-link { color: var(--accent); text-decoration: none; font-size: 12px; }
    #info-body a.info-link:hover { text-decoration: underline; }
    #info-body .info-showall { color: var(--text-dim); font-size: 11.5px; cursor: pointer; }
    #info-body .info-showall:hover { color: var(--text); text-decoration: underline; }
    #info-body .info-id { color: var(--text-dim); font-size: 10.5px; font-family: ui-monospace, monospace; margin-top: 8px; word-break: break-all; }
    .legend-row.selected { background: rgba(255,177,105,0.14); border-radius: 3px; box-shadow: inset 2px 0 0 var(--accent); }
    #sidebar {
      grid-area: sidebar;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 12px 14px;
      overflow-y: auto;
    }
    #sidebar-toggle {
      display: block; position: absolute; top: 10px; left: 10px; z-index: 20;
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 4px; padding: 4px 9px; font-size: 12px; cursor: pointer; opacity: 0.9;
    }
    #sidebar-toggle:hover { border-color: var(--accent); opacity: 1; }
    #sidebar h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 14px 0 6px;
      font-weight: 600;
    }
    #sidebar h2:first-child { margin-top: 0; }

    /* ── ingredient navigation ── */
    #ing-search {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: inherit;
      margin-bottom: 8px;
    }
    #ing-search::placeholder { color: var(--text-dim); }
    .ing-tools { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .ing-tools .ing-actions { display: flex; align-items: center; gap: 7px; }
    .ing-tools a { color: var(--accent); font-size: 11.5px; cursor: pointer; text-decoration: none; }
    .ing-tools a:hover { text-decoration: underline; }
    .ing-tools .ing-sep { color: var(--text-dim); font-size: 11px; }
    .ing-tools .ing-hint { color: var(--text-dim); font-size: 10.5px; line-height: 1.3; }
    .cat-group { margin-bottom: 6px; }
    .cat-head {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-dim); font-weight: 600;
      padding: 5px 0 3px; user-select: none;
    }
    .cat-head .cat-caret {
      width: 12px; flex-shrink: 0; text-align: center; font-size: 9px;
      color: var(--text-dim); cursor: pointer;
    }
    .cat-head .cat-caret:hover { color: var(--accent); }
    .cat-head .cat-cb { margin: 0; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .cat-head .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .cat-head .cat-name { flex: 1; cursor: pointer; }
    .cat-head .cat-name:hover { color: var(--text); }
    .cat-head .cat-count { color: var(--text-dim); font-weight: 400; font-variant-numeric: tabular-nums; }
    .cat-head .cat-only { color: var(--text-dim); font-size: 10px; opacity: 0; padding: 0 3px; cursor: pointer; text-transform: none; letter-spacing: 0; }
    .cat-head:hover .cat-only { opacity: 1; }
    .cat-head .cat-only:hover { color: var(--accent); }
    .cat-group.collapsed .cat-rows { display: none; }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0 3px 8px; cursor: pointer; user-select: none;
    }
    .legend-row:hover { background: var(--panel-2); border-radius: 3px; }
    .legend-row .ing-cb { margin: 0; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .legend-row .swatch {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .legend-row .name { flex: 1; font-size: 12px; line-height: 1.25; }
    .legend-row .count { color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 11px; }
    .legend-row .only {
      color: var(--text-dim); font-size: 10.5px; opacity: 0; padding: 0 4px;
    }
    .legend-row:hover .only { opacity: 1; }
    .legend-row .only:hover { color: var(--accent); }
    .legend-row.off .swatch { opacity: 0.2; }
    .legend-row.off .name { color: var(--text-dim); text-decoration: line-through; }
    .legend-row.size-off .swatch { opacity: 0.35; }
    .legend-row.size-off .name { color: var(--text-dim); font-style: italic; }
    .size-range-readout { color: var(--text-dim); font-size: 11px; text-align: right; font-variant-numeric: tabular-nums; margin-top: 2px; }

    .slider-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .slider-row label { width: 60px; color: var(--text-dim); }
    .slider-row input[type="range"] { flex: 1; }
    .slider-row .value { font-variant-numeric: tabular-nums; color: var(--text-dim); width: 50px; text-align: right; }
    #status { font-size: 11.5px; color: var(--text-dim); line-height: 1.5; }
    #status .num { color: var(--text); font-variant-numeric: tabular-nums; }
    footer {
      grid-area: footer; background: var(--panel); border-top: 1px solid var(--border);
      padding: 4px 14px; font-size: 11px; color: var(--text-dim);
      display: flex; gap: 18px; justify-content: flex-end;
    }
    footer .stat { font-variant-numeric: tabular-nums; }
    .toggle-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 8px; }
    .toggle-grid label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <header>
      <h1>parsimony<span class="sub">interactive 3D molecular packing</span></h1>
      <div style="flex:1"></div>
      <button id="about-btn" title="how this model was made">ⓘ about</button>
      <button id="reset-view">reset view</button>
      <button id="vr-button" disabled title="Checking for a headset…">View in VR</button>
    </header>

    <div id="canvas-wrap">
      <div id="drop-overlay"></div>
      <button id="sidebar-toggle" title="collapse / expand the side panel">‹ panel</button>
      <div id="about-panel" hidden>
        <button id="about-close" title="close">×</button>
        <div id="about-body"></div>
      </div>
      <div id="info-panel" hidden>
        <button id="info-close" title="close">×</button>
        <div id="info-body"></div>
      </div>
    </div>

    <aside id="sidebar">
      <h2>ingredients</h2>
      <input id="ing-search" type="text" placeholder="search ingredients…" autocomplete="off">
      <div class="ing-tools">
        <div class="ing-actions">
          <a id="ing-showall">show all</a>
          <span class="ing-sep">·</span>
          <a id="ing-hideall">hide all</a>
        </div>
        <div class="ing-actions">
          <a id="ing-expandall">expand all</a>
          <span class="ing-sep">·</span>
          <a id="ing-collapseall">collapse all</a>
        </div>
        <span class="ing-hint">categories start collapsed — click one to expand · checkbox = show/hide · “only” = isolate</span>
      </div>
      <div id="legend">
        <div style="color: var(--text-dim); font-size: 12px;">loading…</div>
      </div>

      <h2>style</h2>
      <div class="toggle-grid">
        <label><input type="radio" name="style" value="standard" checked> standard</label>
        <label><input type="radio" name="style" value="goodsell"> Goodsell</label>
      </div>
      <h2>crowding</h2>
      <div class="slider-row" title="Fraction of interior instances drawn (viz-only subsample).">
        <label>show %</label>
        <input type="range" id="show-fraction" min="5" max="100" step="5" value="100">
        <span class="value" id="show-fraction-value">100</span>
      </div>

      <h2>size range</h2>
      <div class="size-filter" title="Hide molecules whose size (enclosing radius, in Å) is outside this range. Full range shows everything; raise ‘min’ to drop the small molecules, lower ‘max’ to drop the large ones.">
        <div class="slider-row"><label>min</label><input type="range" id="size-min" min="0" max="100" step="1" value="0"></div>
        <div class="slider-row"><label>max</label><input type="range" id="size-max" min="0" max="100" step="1" value="100"></div>
        <div class="size-range-readout" id="size-range-value">—</div>
      </div>

      <div id="mesh-loading-status" style="color: var(--text-dim); font-size: 11.5px; margin-top: 4px;">loading…</div>

      <!-- Engine controls kept (JS binds to them) but hidden from this curated view. -->
      <div style="display:none;" aria-hidden="true">
        <input type="checkbox" id="toggle-membrane" checked>
        <input type="checkbox" id="toggle-spin">
        <select id="demo-picker"></select>
        <input type="file" id="file-input">
        <input type="checkbox" id="toggle-bbox">
        <input type="checkbox" id="toggle-axes">
        <input type="checkbox" id="toggle-bg-grid">
        <input type="range" id="mesh-budget" min="1" max="12" step="0.5" value="4">
        <span id="mesh-budget-value"></span>
        <input type="range" id="sphere-budget" min="3" max="60" step="1" value="6">
        <span id="sphere-budget-value"></span>
        <select id="slice-axis"><option value="">none</option></select>
        <input type="range" id="slice-pos" min="-1" max="1" step="0.005" value="0">
        <span id="slice-pos-value"></span>
        <input type="checkbox" id="slice-flip">
        <div id="outline-row"><input type="range" id="outline-width" min="0" max="4" step="0.25" value="1.5"><span id="outline-width-value"></span></div>
      </div>
    </aside>

    <footer>
      <span class="stat" id="stat-placements">— placements</span>
      <span class="stat" id="stat-types">— types</span>
      <span class="stat" id="stat-fps">— fps</span>
    </footer>
  </div>

  <script type="module" src="./viewer.js?v=23"></script>
</body>
</html>
