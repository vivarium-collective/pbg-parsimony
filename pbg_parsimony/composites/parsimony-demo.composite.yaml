name: parsimony-demo
description: "Pack a small example cell (a few real PDB structures + a lipid membrane in a capsule) into a 3D molecular scene with the parsimony engine. The result is a *.pack.json explorable in the bundled interactive viewer (see `python -m pbg_parsimony.demo`)."
tags: [structural-biology, cellpack, mesoscale, packing, demo, 3d]

requires:
  processes: [ParsimonyPackStep, RAMEmitter]

parameters:
  out_dir:
    type: string
    default: "out/parsimony-demo/_build"
    description: "Where the recipe, meshes, sidecar and pack are written."
  scale:
    type: float
    default: 1.0
    description: "Abundance scale applied to every ingredient count."

state:
  parsimony_pack:
    _type: step
    address: "local:ParsimonyPackStep"
    config:
      name: "demo"
      out_dir: "${out_dir}"
      scale: "${scale}"
      proxy_lod: 2
      spec:
        capsule: { half_len: 1500.0, radius: 900.0 }
        ingredients:
          - { id: groel, count: 40, region: interior, category: "Protein folding",
              display_name: "GroEL/ES chaperonin", color: [0.95, 0.85, 0.3],
              structure: { kind: pdb, ref: "1AON" }, proxy_voxel_size: 12.0 }
          - { id: lysozyme, count: 320, region: interior, category: "Metabolism",
              display_name: "Lysozyme", color: [0.5, 0.8, 0.55],
              structure: { kind: pdb, ref: "1AKI" } }
          - { id: hemoglobin, count: 220, region: interior, category: "Metabolism",
              display_name: "Hemoglobin", color: [0.85, 0.4, 0.4],
              structure: { kind: pdb, ref: "1HHO" } }
          - { id: lipid, count: 6000, region: surface, category: "Envelope",
              display_name: "Membrane lipid", color: [0.82, 0.78, 0.68],
              sphere_radius: 12.0, principal_vector: [0, 0, 1] }
    inputs:
      counts: ["stores", "counts"]
    outputs:
      pack: ["stores", "pack"]
  stores:
    counts: {}
    pack: {}
  emitter:
    _type: step
    address: "local:RAMEmitter"
    config:
      emit: {}
    inputs:
      pack: ["stores", "pack"]
